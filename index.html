<!doctype html>
<html lang="ko" translate="no">

<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bible Crew Integrated App</title>
</head>

<body>
  <div id="root">
    <style>
      .initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #f8f9fa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #1D3557;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(29, 53, 87, 0.2);
        border-left-color: #1D3557;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <div class="initial-loader">
      <div class="spinner"></div>
      <div style="font-weight: 600; font-size: 15px;">앱을 준비하는 중입니다...</div>
      <div style="font-size: 12px; color: #6c757d; margin-top: 8px;">잠시만 기다려 주세요</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
